name: Build Windows FFmpeg

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows-x64:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    env:
      FFMPEG_VERSION: n8.0.1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Force LF line endings for checkout
        shell: powershell
        run: git config --global core.autocrlf input

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute build metadata
        id: build_meta
        shell: powershell
        run: |
          $buildStamp = Get-Date -AsUTC -Format "yyyyMMdd-HHmmss"
          "build_stamp=$buildStamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive_name=ffmpeg-windows-x86_64-${{ env.FFMPEG_VERSION }}-$buildStamp.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=${{ env.FFMPEG_VERSION }}-$buildStamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: minimal
          install: >-
            git
            make
            nasm
            perl
            pkgconf
          pacboy: >-
            toolchain:p
            ffmpeg:p

      - name: Build minimal FFmpeg
        run: bash scripts/build-ffmpeg-windows.sh

      - name: Smoke test built binary
        run: |
          set -euo pipefail
          ARTIFACT_FFMPEG="$(pwd)/dist/ffmpeg-windows-x86_64/bin/ffmpeg.exe"

          ffmpeg -hide_banner -y -f lavfi -i testsrc2=size=320x180:rate=10 -frames:v 20 sample.mp4

          "${ARTIFACT_FFMPEG}" -hide_banner -protocols | tee protocols.txt
          "${ARTIFACT_FFMPEG}" -hide_banner -hwaccels | tee hwaccels.txt
          "${ARTIFACT_FFMPEG}" -hide_banner -muxers | tee muxers.txt
          "${ARTIFACT_FFMPEG}" -hide_banner -encoders | tee encoders.txt
          "${ARTIFACT_FFMPEG}" -hide_banner -decoders | tee decoders.txt
          "${ARTIFACT_FFMPEG}" -hide_banner -demuxers | tee demuxers.txt

          if grep -wEq 'http|https|rtmp|rtsp|tcp|udp' protocols.txt; then
            echo "unexpected network protocol enabled"
            exit 1
          fi

          if tail -n +2 hwaccels.txt | grep -q '[[:alnum:]]'; then
            echo "unexpected hardware acceleration enabled"
            exit 1
          fi

          grep -wq image2 muxers.txt
          grep -wq mjpeg encoders.txt
          grep -wq h264 decoders.txt
          grep -wq hevc decoders.txt
          grep -wq vp9 decoders.txt
          grep -wq av1 decoders.txt
          grep -Eq 'mov,mp4,m4a,3gp,3g2,mj2| mov ' demuxers.txt
          grep -Eq 'matroska,webm| matroska ' demuxers.txt
          grep -Eq 'avi ' demuxers.txt
          grep -Eq 'mpegts ' demuxers.txt

          mkdir -p smoke-output
          "${ARTIFACT_FFMPEG}" -hide_banner -y -i sample.mp4 -vf "fps=2,scale=160:-1" smoke-output/frame-%03d.jpg

          test -f smoke-output/frame-001.jpg
          test "$(find smoke-output -name '*.jpg' | wc -l)" -gt 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x86_64-${{ env.FFMPEG_VERSION }}-${{ steps.build_meta.outputs.build_stamp }}
          path: dist/ffmpeg-windows-x86_64

      - name: Package release archive
        shell: powershell
        run: |
          $archivePath = Join-Path release "${{ steps.build_meta.outputs.archive_name }}"

          New-Item -ItemType Directory -Force -Path release | Out-Null
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path dist/ffmpeg-windows-x86_64/* -DestinationPath $archivePath

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_meta.outputs.release_tag }}
          name: FFmpeg ${{ env.FFMPEG_VERSION }} build ${{ steps.build_meta.outputs.build_stamp }} UTC
          body: |
            Automated Windows x86_64 FFmpeg build.

            Upstream FFmpeg tag: ${{ env.FFMPEG_VERSION }}
            Source revision: ${{ github.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: release/${{ steps.build_meta.outputs.archive_name }}
